name: whisper-api

services:
  whisper-api:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    image: whisper-api:${IMAGE_TAG:-v1}
    container_name: whisper-api
    ports:
      - "${HOST_PORT:-9001}:${PORT:-80}"
    environment:
      - TZ=${TZ:-Asia/Taipei}
      - HF_TOKEN=${HF_TOKEN:-}
      - HF_HUB_DISABLE_SYMLINKS=${HF_HUB_DISABLE_SYMLINKS:-1}
      - PORT=${PORT:-80}
      - TEMP_DIR=${TEMP_DIR:-/app/Temp}
      - LOG_DIR=${LOG_DIR:-/app/Log}
      - TEMP_RETENTION_DAYS=${TEMP_RETENTION_DAYS:-7}
      - CLEANUP_INTERVAL_SEC=${CLEANUP_INTERVAL_SEC:-3600}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-30}
      - DEFAULT_MODEL_SIZE=${DEFAULT_MODEL_SIZE:-small}
      - DEFAULT_BATCH_SIZE=${DEFAULT_BATCH_SIZE:-16}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-1024}
      - MAX_DOWNLOAD_MB=${MAX_DOWNLOAD_MB:-1024}
      - DOWNLOAD_TIMEOUT_SEC=${DOWNLOAD_TIMEOUT_SEC:-120}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      # 開發時直接掛載 Code；修改 Python 後重啟容器即可，不需重建 CUDA image。
      - ../Code:/app
      - ../Temp:${TEMP_DIR:-/app/Temp}
      - ../Log:${LOG_DIR:-/app/Log}
      - whisper_api_model_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  whisper_api_model_cache:
